name: Build and Release

# Triggers when you push a tag like v1.0, v2.1, etc.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      # 1. Check out the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Select Xcode version
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      # 3. Build the executable
      - name: Build
        run: swift build -c release

      # 4. Create .app bundle and ad-hoc sign
      - name: Package
        run: |
          APP="CHDForge.app/Contents"
          mkdir -p "$APP/MacOS" "$APP/Resources"
          cp .build/release/CHDMAN "$APP/MacOS/CHDForge"
          cp Sources/CHDMAN/Resources/Info.plist "$APP/Info.plist"
          cp Sources/CHDMAN/Resources/AppIcon.icns "$APP/Resources/AppIcon.icns"
          codesign --force --sign - CHDForge.app
          ditto -c -k --keepParent CHDForge.app CHDForge.app.zip

      # 5. Create a GitHub Release with the zip attached
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: CHDForge.app.zip
          generate_release_notes: true
